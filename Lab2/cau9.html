<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        #show {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
    <button onclick="showImage()">click</button>
    <div id="show">

    </div>

    <script>
        function showImage() {
            var div = document.getElementById('show');
            div.innerHTML = ""
            switch (RandNumber()) {
                case 0:
                    div.innerHTML = `<img src="http://farm4.staticflickr.com/3691/11268502654_f28f05966c_m.jpg" alt="" width="240" height="160">`
                    break;
                case 1:
                    div.innerHTML = `<img src="http://farm1.staticflickr.com/33/45336904_1aef569b30_n.jpg" width="320" height="195" alt="">`;
                    break;
                case 2:
                    div.innerHTML = `<img src="http://farm6.staticflickr.com/5211/5384592886_80a512e2c9.jpg" width="500" height="343" alt="">`;
                    break;
                default:
                    break;
            }
        }

        function RandNumber() {
            return Math.floor(Math.random() * 3)

        }
    </script>
</body>

</html>
