<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cau 4</title>
</head>

<body>
    <table id="myTable" border="1">
        <tr>
            <td>Row 1 cell 1</td>
            <td>Row 1 cell 2</td>
        </tr>
        <tr>
            <td>Row 2 cell 1</td>
            <td>Row 2 cell 2</td>
        </tr>
    </table>
    <input type="text" type="button" onclick="insertRow()" value="Insert Row">
    <script>
        function insertRow(event) {

            document.getElementById('myTable').innerHTML +=
                `<tr>
                    <td>Row 3 cell 1</td>
                    <td>Row 3 cell 2</td>
                </tr>`
        }
    </script>
</body>
</html>
