<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p>
        <a id="someLink" href="www.google.com" hreflang="en-us" rel="nofollow" target="_self" type="text/html">
            Google website
        </a>
    </p>
    <button onclick="getAttributes()">
        click
    </button>
    <br>

    <div id="kq">
    </div>
</body>
<script>
    function getAttributes() {
        var someLink = document.getElementById('someLink');
        var href = someLink.href;
        var hreflang = someLink.hreflang;
        var target = someLink.target;
        var rel = someLink.rel;

        document.getElementById('kq').innerHTML += `<strong>hreflang</strong>: ${hreflang} </br> <strong>target</strong>: ${target} </br> <strong>hreflang</strong>: ${hreflang} </br> <strong>rel</strong>: ${rel}`
    }   
</script>

</html>
